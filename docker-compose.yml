version: "3.8"

services:
  # Container 1: The Chrome Browser
  selenium-grid:
    image: selenium/standalone-chrome:latest
    container_name: selenium-grid
    ports:
      - "4444:4444"
      - "7900:7900" 
    shm_size: 2gb

  # Container 2: The Test Runner (Gradle)
  tests:
    image: gradle:latest
    container_name: gradle-tests
    depends_on:
      - selenium-grid
    volumes:
      # Maps your local project folder into the container
      - .:/home/gradle/project
    working_dir: /home/gradle/project
    # The command it runs when it starts
    command: gradle test --info